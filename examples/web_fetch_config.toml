# Example configuration that builds a knowledge base from live web pages.
#
# The web loader is provider-agnostic: it fetches each URL through a pluggable
# backend that you choose. Select one with `backend` (an optional adapter), or
# pass your own client in code. The package's default path stays fully offline;
# web fetching is opt-in.
#
# This example uses the optional "linkup" adapter. Install it and set your API
# key before running:
#
#   pip install "linear-adapter-trainer[linkup]"
#   export LINKUP_API_KEY=...

[knowledge_base]
format = "web_fetch"
backend = "linkup"
urls = [
    "https://www.santander.com/en/stories/santander-publishes-ai-projects-under-an-open-source-licence-to-ramp-up-shared-innovation",
]
render_js = true

[knowledge_base.chunking]
enabled = true
chunk_size = 512
chunk_overlap = 64

[embedder]
backend = "hashing"
dimension = 512

[query_generator]
backend = "template"
seed = 0

[negative_generator]
backend = "none"

[dataset]
queries_per_chunk = 4
negatives_per_query = 2
strategy = "mixed"
pool_size = 8
val_fraction = 0.25
split_strategy = "chunk"
seed = 0
max_workers = 1

[dataset.mix]
semantic_opposite = 0.5
hard = 0.3
random = 0.2

[training]
epochs = 30
batch_size = 32
learning_rate = 0.005
margin = 0.2
distance = "cosine"
residual = true
monitor = "mrr"
patience = 6
eval_ks = [1, 3, 5, 10]
seed = 0

[output]
dataset_dir = "examples/artifacts/web-fetch-dataset"
adapter_path = "examples/artifacts/web-fetch-adapter.pt"
metrics_path = "examples/artifacts/web-fetch-metrics.json"
